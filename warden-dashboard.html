<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Dashboard - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <div class="row g-4 mb-5 fade-in" style="animation-delay: 0.1s;">
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon icon-blue"><i class="bi bi-people-fill"></i></div>
                    <div class="card-title">Assigned Students</div>
                    <div class="card-value" id="assigned-student-count">-</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="bi bi-door-open-fill"></i></div>
                    <div class="card-title">Rooms Occupied</div>
                    <div class="card-value" id="assigned-room-count">-</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon icon-orange"><i class="bi bi-exclamation-triangle-fill"></i></div>
                    <div class="card-title">Pending Complaints</div>
                    <div class="card-value" id="pending-complaints">-</div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-icon icon-red"><i class="bi bi-calendar2-check-fill"></i></div>
                    <div class="card-title">Pending Leaves</div>
                    <div class="card-value" id="pending-leaves">-</div>
                </div>
            </div>
        </div>

        <div class="row g-4 fade-in" style="animation-delay: 0.2s;">
            <div class="col-lg-8">
                <div class="custom-table-card">
                    <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0">Recent Assigned Students</h5>
                        <a href="admin-students.html" class="btn btn-sm btn-outline-primary rounded-pill px-3">Manage Students</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Student Name</th>
                                    <th>Room No</th>
                                    <th>Fees</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="recent-students-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="custom-table-card h-100">
                    <div class="p-4 border-bottom">
                        <h5 class="fw-bold mb-0">Quick Actions</h5>
                    </div>
                    <div class="p-4">
                        <div class="d-grid gap-3">
                            <button class="btn btn-premium py-3" onclick="location.href='admin-students.html'"><i class="bi bi-people me-2"></i> Manage Students</button>
                            <button class="btn btn-outline-primary py-3" style="border-radius: var(--radius);" onclick="location.href='warden-rooms.html'"><i class="bi bi-door-open me-2"></i> Manage Assigned Rooms</button>
                            <button class="btn btn-outline-primary py-3" style="border-radius: var(--radius);" onclick="location.href='admin-attendance.html'"><i class="bi bi-calendar-event me-2"></i> Manage Attendance</button>
                            <button class="btn btn-outline-primary py-3" style="border-radius: var(--radius);" onclick="location.href='admin-complaints.html'"><i class="bi bi-exclamation-triangle me-2"></i> Manage Complaints</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const context = await initWardenPage('Dashboard');
            if (!context) return;
            try {
                const [studentsRes, roomsRes, complaintsRes, leavesRes] = await Promise.all([
                    apiRequest('/users/students'),
                    apiRequest('/rooms'),
                    apiRequest('/complaints'),
                    apiRequest('/leaves?status=Pending')
                ]);

                const students = studentsRes.students || [];
                const rooms = roomsRes.rooms || [];
                const complaints = complaintsRes.complaints || [];
                const leaves = leavesRes.leaveRequests || [];

                const occupiedRooms = rooms.filter(r => (r.occupants || []).length > 0).length;
                document.getElementById('assigned-student-count').textContent = students.length;
                document.getElementById('assigned-room-count').textContent = `${occupiedRooms}/${rooms.length}`;
                document.getElementById('pending-complaints').textContent = complaints.filter(c => c.status === 'Pending').length;
                document.getElementById('pending-leaves').textContent = leaves.length;

                const recentStudents = students.slice(0, 5);
                const tableBody = document.getElementById('recent-students-table');
                tableBody.innerHTML = recentStudents.map(s => {
                    const roomNo = s.room && s.room.roomNo ? s.room.roomNo : 'Not Allocated';
                    const statusBadge = s.feesStatus === 'Paid' ? 'badge-success' : 'badge-danger';
                    return `
                        <tr>
                            <td>
                                <div class="fw-bold">${s.name}</div>
                                <div class="small text-muted">${s.email}</div>
                            </td>
                            <td>${roomNo}</td>
                            <td><span class="badge badge-custom ${statusBadge}">${s.feesStatus}</span></td>
                            <td>
                                <button class="btn btn-sm btn-light border" onclick="location.href='admin-students.html'"><i class="bi bi-pencil-square"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('') || '<tr><td colspan="4" class="text-muted py-3">No assigned students found.</td></tr>';
            } catch (_e) {
                document.getElementById('assigned-student-count').textContent = '0';
                document.getElementById('assigned-room-count').textContent = '0/0';
                document.getElementById('pending-complaints').textContent = '0';
                document.getElementById('pending-leaves').textContent = '0';
                document.getElementById('recent-students-table').innerHTML =
                    '<tr><td colspan="4" class="text-danger py-3">Failed to load dashboard data.</td></tr>';
            }
        });
    </script>
</body>
</html>
