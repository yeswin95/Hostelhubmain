<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Menu - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-1">Weekly Hostel Menu</h2>
        <p class="text-muted mb-4">Meals served each day</p>

        <div class="row g-3 student-menu-week fade-in" id="menu-container">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function mealRow(label, text) {
            const safe = text ? escapeHtml(text) : '—';
            return `
                <li class="list-group-item border-0 px-3 py-2">
                    <div class="d-flex gap-3 align-items-start">
                        <span class="student-menu-meal-label">${label}</span>
                        <span class="student-menu-meal-text flex-grow-1">${safe}</span>
                    </div>
                </li>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const context = await initStudentPage('Hostel Menu');
            if (!context) return;
            if (context.blocked) return;

            const container = document.getElementById('menu-container');
            const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const today = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][new Date().getDay()];
            try {
                const response = await apiRequest('/menu');
                const menuData = (response.menu || []).slice().sort((a, b) => dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day));
                if (!menuData.length) {
                    container.innerHTML = '<div class="col-12"><p class="text-muted mb-0">Menu not available yet.</p></div>';
                    return;
                }
                container.innerHTML = menuData.map((m) => {
                    const isToday = m.day === today;
                    return `
                        <div class="col-12 col-md-6 col-xl-4">
                            <div class="card h-100 border student-menu-day-card shadow-sm ${isToday ? 'border-primary border-2' : ''}">
                                <div class="card-header py-2 px-3 bg-white d-flex justify-content-between align-items-center border-bottom">
                                    <span class="fw-semibold">${m.day}</span>
                                    ${isToday ? '<span class="badge rounded-pill text-bg-primary">Today</span>' : ''}
                                </div>
                                <ul class="list-group list-group-flush">
                                    ${mealRow('Breakfast', m.breakfast)}
                                    ${mealRow('Lunch', m.lunch)}
                                    ${mealRow('Snacks', m.snacks)}
                                    ${mealRow('Dinner', m.dinner)}
                                </ul>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (_e) {
                container.innerHTML = '<div class="col-12"><p class="text-danger mb-0">Failed to load menu.</p></div>';
            }
        });
    </script>
</body>
</html>
