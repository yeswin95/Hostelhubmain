<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Requests - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .leave-admin-reason {
            max-width: 420px;
            min-width: 200px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.875rem;
            line-height: 1.5;
            color: var(--bs-secondary-color, #6c757d);
        }
        .leave-action-icons {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .leave-action-icons .btn-icon {
            width: 2rem;
            height: 2rem;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            line-height: 1;
            border: 1px solid transparent;
        }
        .leave-action-icons .btn-icon-check {
            color: #198754;
            background: rgba(25, 135, 84, 0.1);
        }
        .leave-action-icons .btn-icon-check:hover {
            background: rgba(25, 135, 84, 0.2);
        }
        .leave-action-icons .btn-icon-cross {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.08);
        }
        .leave-action-icons .btn-icon-cross:hover {
            background: rgba(220, 53, 69, 0.18);
        }
    </style>
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Student leave requests</h2>

        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="fw-bold mb-0">All requests</h5>
                <select class="form-select form-select-sm" style="max-width: 200px;" id="filter-leave-status">
                    <option value="all">All statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Room</th>
                            <th>Attendance</th>
                            <th>Dates</th>
                            <th>Reason</th>
                            <th>Requested</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-leaves-body"></tbody>
                </table>
            </div>
        </div>

        <div class="modal fade" id="leaveReviewModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow" style="border-radius: var(--radius);">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold"><span id="review-action-label"></span> leave</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="leaveReviewForm">
                        <input type="hidden" id="review-leave-id">
                        <input type="hidden" id="review-decision">
                        <div class="modal-body p-4">
                            <p class="small text-muted mb-2" id="review-leave-meta"></p>
                            <div class="border rounded-3 p-3 bg-light mb-3">
                                <div class="small fw-bold text-muted mb-1">Student reason</div>
                                <p class="small mb-0 text-break" id="review-leave-reason" style="white-space: pre-wrap;"></p>
                            </div>
                            <label class="form-label">Note to student (optional)</label>
                            <textarea class="form-control" id="review-remark" rows="3" maxlength="500" placeholder="e.g. Approved — submit gate pass at security"></textarea>
                        </div>
                        <div class="modal-footer border-0 pt-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-premium px-4" id="review-submit-btn">Confirm</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        let leaveReviewModal = null;
        let leavesAdminCache = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
            renderSidebar('Leave Requests', 'admin');
            renderTopNav(user.name);
            leaveReviewModal = new bootstrap.Modal(document.getElementById('leaveReviewModal'));

            document.getElementById('filter-leave-status').addEventListener('change', loadAdminLeaves);
            document.getElementById('leaveReviewForm').addEventListener('submit', submitLeaveReview);

            await loadAdminLeaves();
        });

        function leaveStatusBadge(status) {
            if (status === 'Approved') return 'badge-success';
            if (status === 'Rejected') return 'badge-danger';
            return 'badge-warning';
        }

        window.openLeaveReview = function (id, decision) {
            document.getElementById('review-leave-id').value = id;
            document.getElementById('review-decision').value = decision;
            document.getElementById('review-remark').value = '';
            document.getElementById('review-action-label').textContent = decision === 'Approved' ? 'Approve' : 'Reject';
            const l = leavesAdminCache.find((x) => String(x._id) === String(id));
            const meta = l && l.student
                ? `${l.student.name} · ${new Date(l.startDate).toLocaleDateString()} – ${new Date(l.endDate).toLocaleDateString()}`
                : '';
            document.getElementById('review-leave-meta').textContent = meta;
            document.getElementById('review-leave-reason').textContent = (l && l.reason) ? String(l.reason) : '';
            const btn = document.getElementById('review-submit-btn');
            btn.className = decision === 'Approved' ? 'btn btn-success px-4' : 'btn btn-danger px-4';
            btn.textContent = decision === 'Approved' ? 'Approve request' : 'Reject request';
            leaveReviewModal.show();
        };

        async function submitLeaveReview(e) {
            e.preventDefault();
            const id = document.getElementById('review-leave-id').value;
            const status = document.getElementById('review-decision').value;
            const adminRemark = document.getElementById('review-remark').value.trim();
            try {
                await apiRequest(`/leaves/${id}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status, adminRemark })
                });
                leaveReviewModal.hide();
                await loadAdminLeaves();
            } catch (error) {
                alert(error.message || 'Failed to update request.');
            }
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        async function loadAdminLeaves() {
            const filter = document.getElementById('filter-leave-status').value;
            const tbody = document.getElementById('admin-leaves-body');
            let leaves = [];
            try {
                const q = filter === 'all' ? '' : `?status=${encodeURIComponent(filter)}`;
                const response = await apiRequest(`/leaves${q}`);
                leaves = response.leaveRequests || [];
                leavesAdminCache = leaves;
            } catch (_e) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-danger">Failed to load leave requests.</td></tr>';
                return;
            }

            if (!leaves.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No leave requests found.</td></tr>';
                return;
            }

            tbody.innerHTML = leaves.map((l) => {
                const stu = l.student;
                const name = stu?.name || 'Student';
                const roomNo = stu?.roomNo || 'Not Allocated';
                const attendance = stu?.attendance || { percentage: 0, present: 0, total: 0 };
                const dates = `${new Date(l.startDate).toLocaleDateString()} – ${new Date(l.endDate).toLocaleDateString()}`;
                const reasonEsc = escapeHtml(l.reason);
                const pendingActions = l.status === 'Pending' ? `
                    <div class="leave-action-icons">
                        <button type="button" class="btn btn-sm btn-icon btn-icon-check" title="Approve" aria-label="Approve leave" onclick="openLeaveReview('${l._id}', 'Approved')">
                            <i class="bi bi-check-lg"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-icon btn-icon-cross" title="Reject" aria-label="Reject leave" onclick="openLeaveReview('${l._id}', 'Rejected')">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                ` : `<span class="text-muted small">${l.reviewedAt ? new Date(l.reviewedAt).toLocaleString() : '—'}</span>`;

                return `
                    <tr>
                        <td><div class="fw-bold">${name}</div></td>
                        <td><span class="fw-medium">${roomNo}</span></td>
                        <td>
                            <div class="fw-medium">${attendance.percentage}%</div>
                            <div class="small text-muted">${attendance.present}/${attendance.total} days</div>
                        </td>
                        <td>${dates}</td>
                        <td><div class="leave-admin-reason">${reasonEsc}</div></td>
                        <td>${new Date(l.createdAt).toLocaleDateString()}</td>
                        <td><span class="badge badge-custom ${leaveStatusBadge(l.status)}">${l.status}</span></td>
                        <td>${pendingActions}</td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
