<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Student Management</h2>
            <button class="btn btn-premium" onclick="location.href='signup.html'">
                <i class="bi bi-person-plus me-2"></i> Register New Student
            </button>
        </div>

        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 bg-light" id="search-student" placeholder="Search by name, email or room...">
                        </div>
                    </div>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Student Details</th>
                            <th class="sortable-header" data-sort-key="roomNo" style="cursor:pointer;">Room</th>
                            <th>Allocation</th>
                            <th class="sortable-header" data-sort-key="course" style="cursor:pointer;">Course</th>
                            <th class="sortable-header" data-sort-key="gender" style="cursor:pointer;">Gender</th>
                            <th class="sortable-header" data-sort-key="feesStatus" style="cursor:pointer;">Fees</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Room Allocation Modal -->
        <div class="modal fade" id="allocationModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow" style="border-radius: var(--radius);">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold" id="allocation-modal-title">Allocate Room</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="allocationForm">
                        <div class="modal-body p-4">
                            <p class="text-muted mb-3" id="allocation-student-name">Select an available room.</p>
                            <label class="form-label">Available Rooms</label>
                            <select class="form-select" id="allocation-room-select" required>
                                <option value="">Loading rooms...</option>
                            </select>
                        </div>
                        <div class="modal-footer border-0 pt-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-premium px-4" id="allocation-submit-btn">Allocate Room</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Edit Student Modal -->
        <div class="modal fade" id="editStudentModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow" style="border-radius: var(--radius);">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold mb-0">Edit Student</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="editStudentForm">
                        <input type="hidden" id="edit-student-id">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="edit-student-name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="edit-student-email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" id="edit-student-phone" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Course</label>
                                <input type="text" id="edit-student-course" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Gender</label>
                                <select id="edit-student-gender" class="form-select" required>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="mb-0">
                                <label class="form-label">Fees Status</label>
                                <select id="edit-student-fees" class="form-select" required>
                                    <option value="Pending">Pending</option>
                                    <option value="Paid">Paid</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-premium px-4">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        let selectedStudentId = null;
        let selectedStudentMode = 'allocate';
        let allocationModal = null;
        let editStudentModal = null;
        let studentsCache = [];
        let sortState = { key: null, dir: 0 };

        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user || !['admin', 'warden'].includes(user.role)) { window.location.href = 'login.html'; return; }
            renderSidebar('Students', user.role);
            renderTopNav(user.name);
            allocationModal = new bootstrap.Modal(document.getElementById('allocationModal'));
            editStudentModal = new bootstrap.Modal(document.getElementById('editStudentModal'));

            const searchEl = document.getElementById('search-student');
            searchEl.addEventListener('input', () => loadStudents());
            document.getElementById('allocationForm').addEventListener('submit', handleRoomAllocation);
            document.getElementById('editStudentForm').addEventListener('submit', submitStudentEdit);
            document.querySelectorAll('.sortable-header').forEach((header) => {
                header.addEventListener('click', () => toggleSort(header.getAttribute('data-sort-key')));
            });
            loadStudents();
        });

        function toggleSort(key) {
            if (sortState.key !== key) {
                sortState = { key, dir: 1 };
            } else if (sortState.dir === 1) {
                sortState = { key, dir: -1 };
            } else {
                sortState = { key: null, dir: 0 };
            }
            updateSortHeaderUI();
            loadStudents();
        }

        function updateSortHeaderUI() {
            document.querySelectorAll('.sortable-header').forEach((header) => {
                const key = header.getAttribute('data-sort-key');
                const label = header.textContent.split(' ')[0];
                if (sortState.key === key && sortState.dir === 1) {
                    header.textContent = `${label} ↑`;
                } else if (sortState.key === key && sortState.dir === -1) {
                    header.textContent = `${label} ↓`;
                } else {
                    header.textContent = label;
                }
            });
        }

        async function loadStudents() {
            const search = (document.getElementById('search-student').value || '').toLowerCase();
            const list = document.getElementById('student-list');

            list.innerHTML = '<tr><td colspan="7" class="text-muted py-3">Loading...</td></tr>';

            try {
                const response = await apiRequest('/users/students');
                const students = response.students || [];
                studentsCache = students;

                const mapped = students.map((s, idx) => ({
                    _idx: idx,
                    _id: s._id,
                    name: s.name || '-',
                    email: s.email || '-',
                    phone: s.phone || '-',
                    room: s.room || null,
                    roomNo: s.room && s.room.roomNo ? s.room.roomNo : 'Not Allocated Yet',
                    allocationStatus: s.allocationStatus || (s.room ? 'allocated' : 'pending'),
                    course: s.course || '-',
                    gender: s.gender || '-',
                    feesStatus: s.feesStatus || 'Pending'
                }));

                const filtered = mapped.filter(s =>
                    s.name.toLowerCase().includes(search) ||
                    s.email.toLowerCase().includes(search) ||
                    String(s.roomNo).toLowerCase().includes(search)
                );

                if (sortState.key && sortState.dir !== 0) {
                    filtered.sort((a, b) => {
                        const av = String(a[sortState.key] || '').toLowerCase();
                        const bv = String(b[sortState.key] || '').toLowerCase();
                        if (av === bv) return a._idx - b._idx;
                        return av > bv ? sortState.dir : -sortState.dir;
                    });
                } else {
                    filtered.sort((a, b) => a._idx - b._idx);
                }

                if (!filtered.length) {
                    list.innerHTML = '<tr><td colspan="7" class="text-muted py-3">No students found.</td></tr>';
                    return;
                }

                list.innerHTML = filtered.map(s => {
                    const statusClass = s.feesStatus === 'Paid' ? 'badge-success' : 'badge-danger';
                    const allocationClass = s.allocationStatus === 'allocated' ? 'badge-success' : 'badge-warning text-dark';
                    return `
                        <tr>
                            <td>
                                <div class="fw-bold">${s.name}</div>
                                <div class="small text-muted">${s.email}</div>
                                <div class="small text-muted">${s.phone}</div>
                            </td>
                            <td><span class="fw-medium">${s.roomNo}</span></td>
                            <td><span class="badge badge-custom ${allocationClass}">${s.allocationStatus}</span></td>
                            <td>${s.course}</td>
                            <td>${s.gender}</td>
                            <td><span class="badge badge-custom ${statusClass}">${s.feesStatus}</span></td>
                            <td>
                                <div class="d-flex gap-2">
                                    ${s.allocationStatus === 'pending' ? `
                                    <button class="btn btn-sm btn-premium" onclick="openAllocateModal('${s._id}', '${s.name.replace(/'/g, "\\'")}', '${String(s.gender || '-').replace(/'/g, "\\'")}', '${s.room && s.room._id ? s.room._id : ''}')">
                                        Allocate
                                    </button>` : `
                                    <button class="btn btn-sm btn-outline-primary" onclick="openReallocateModal('${s._id}', '${s.name.replace(/'/g, "\\'")}', '${String(s.gender || '-').replace(/'/g, "\\'")}', '${s.room && s.room._id ? s.room._id : ''}')">
                                        Reallocate
                                    </button>`}
                                    <button class="btn btn-sm btn-light border" onclick="openEditStudentModal('${s._id}')">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-light border text-danger" onclick="deleteStudent('${s._id}')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (_e) {
                const msg = _e && _e.message ? _e.message : 'Failed to load students.';
                list.innerHTML = `<tr><td colspan="7" class="text-danger py-3">${msg}</td></tr>`;
            }
        }

        async function openAllocateModal(studentId, studentName, gender, currentRoomId = '') {
            selectedStudentId = studentId;
            selectedStudentMode = 'allocate';
            document.getElementById('allocation-modal-title').textContent = 'Allocate Room';
            document.getElementById('allocation-submit-btn').textContent = 'Allocate Room';
            document.getElementById('allocation-student-name').textContent = `Allocate room for ${studentName} (${gender || '-'})`;
            await loadAllocationOptions(currentRoomId);
            allocationModal.show();
        }

        async function openReallocateModal(studentId, studentName, gender, currentRoomId = '') {
            selectedStudentId = studentId;
            selectedStudentMode = 'reallocate';
            document.getElementById('allocation-modal-title').textContent = 'Reallocate Room';
            document.getElementById('allocation-submit-btn').textContent = 'Reallocate Room';
            document.getElementById('allocation-student-name').textContent = `Move ${studentName} (${gender || '-'}) to another room`;
            await loadAllocationOptions(currentRoomId);
            allocationModal.show();
        }

        async function loadAllocationOptions(currentRoomId = '') {
            const select = document.getElementById('allocation-room-select');
            select.innerHTML = '<option value="">Loading available rooms...</option>';

            try {
                const response = await apiRequest('/rooms?availableOnly=true');
                let rooms = response.rooms || [];
                if (currentRoomId) {
                    rooms = rooms.filter((room) => String(room._id) !== String(currentRoomId));
                }
                if (!rooms.length) {
                    select.innerHTML = '<option value="">No suitable rooms available</option>';
                } else {
                    select.innerHTML = `
                        <option value="">Select a room</option>
                        ${rooms.map(room => `
                            <option value="${room._id}">
                                Room ${room.roomNo} (${(room.occupants || []).length}/${room.capacity})
                            </option>
                        `).join('')}
                    `;
                }
            } catch (_e) {
                alert('Failed to load available rooms.');
            }
        }

        window.openEditStudentModal = function (studentId) {
            const student = studentsCache.find(s => String(s._id) === String(studentId));
            if (!student) return;
            document.getElementById('edit-student-id').value = student._id;
            document.getElementById('edit-student-name').value = student.name || '';
            document.getElementById('edit-student-email').value = student.email || '';
            document.getElementById('edit-student-phone').value = student.phone || '';
            document.getElementById('edit-student-course').value = student.course || '';
            document.getElementById('edit-student-gender').value = student.gender || 'Male';
            document.getElementById('edit-student-fees').value = student.feesStatus || 'Pending';
            editStudentModal.show();
        };

        async function submitStudentEdit(e) {
            e.preventDefault();
            const studentId = document.getElementById('edit-student-id').value;
            if (!studentId) return;
            const payload = {
                name: document.getElementById('edit-student-name').value.trim(),
                email: document.getElementById('edit-student-email').value.trim(),
                phone: document.getElementById('edit-student-phone').value.trim(),
                course: document.getElementById('edit-student-course').value.trim(),
                gender: document.getElementById('edit-student-gender').value,
                feesStatus: document.getElementById('edit-student-fees').value
            };
            try {
                await apiRequest(`/users/students/${studentId}`, {
                    method: 'PATCH',
                    body: JSON.stringify(payload)
                });
                editStudentModal.hide();
                await loadStudents();
            } catch (error) {
                alert(error.message || 'Failed to update student.');
            }
        }

        async function handleRoomAllocation(e) {
            e.preventDefault();
            const roomId = document.getElementById('allocation-room-select').value;
            if (!selectedStudentId || !roomId) {
                alert('Please select a room.');
                return;
            }
            try {
                const endpoint = selectedStudentMode === 'reallocate' ? '/rooms/reallocate' : '/rooms/allocate';
                const payload = selectedStudentMode === 'reallocate'
                    ? { studentId: selectedStudentId, newRoomId: roomId }
                    : { studentId: selectedStudentId, roomId };
                await apiRequest(endpoint, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                allocationModal.hide();
                selectedStudentId = null;
                selectedStudentMode = 'allocate';
                await loadStudents();
            } catch (error) {
                alert(error.message || 'Room update failed.');
            }
        }

        async function deleteStudent(studentId) {
            if (!studentId) return;
            if (!confirm('Are you sure you want to delete this student?')) return;
            try {
                await apiRequest(`/users/students/${studentId}`, { method: 'DELETE' });
                await loadStudents();
            } catch (_e) {
                alert('Failed to delete student.');
            }
        }
    </script>
</body>
</html>
