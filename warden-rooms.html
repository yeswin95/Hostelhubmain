<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Rooms - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Assigned Rooms</h2>
        <div class="row g-4 fade-in" id="rooms-grid"></div>
    </main>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const context = await initWardenPage("Assigned Rooms");
            if (!context) return;
            await loadRooms();
        });

        async function loadRooms() {
            const grid = document.getElementById("rooms-grid");
            grid.innerHTML = '<div class="col-12 text-muted">Loading rooms...</div>';
            try {
                const response = await apiRequest("/rooms");
                const rooms = response.rooms || [];
                if (!rooms.length) {
                    grid.innerHTML = '<div class="col-12 text-muted">No rooms assigned to you.</div>';
                    return;
                }
                grid.innerHTML = rooms.map((r) => {
                    const occupied = (r.occupants || []).length;
                    const pct = r.capacity ? Math.round((occupied / r.capacity) * 100) : 0;
                    return `
                        <div class="col-md-4 col-lg-3">
                            <div class="stat-card">
                                <div class="stat-icon icon-blue mb-2"><i class="bi bi-door-open"></i></div>
                                <h5 class="fw-bold">Room ${r.roomNo}</h5>
                                <div class="small text-muted mb-2">${r.hostel?.name || "-"} · ${r.roomType || "-"}</div>
                                <div class="d-flex justify-content-between small"><span>Occupancy</span><span>${occupied}/${r.capacity}</span></div>
                                <div class="progress mt-2" style="height:6px;"><div class="progress-bar bg-success" style="width:${pct}%"></div></div>
                            </div>
                        </div>
                    `;
                }).join("");
            } catch (error) {
                grid.innerHTML = `<div class="col-12 text-danger">${error.message || "Failed to load rooms."}</div>`;
            }
        }
    </script>
</body>
</html>
