<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Requests - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Hostel Leave Requests</h2>
            <button class="btn btn-premium" data-bs-toggle="modal" data-bs-target="#leaveModal">
                <i class="bi bi-send me-2"></i> Request leave
            </button>
        </div>

        <div class="row fade-in">
            <div class="col-12" id="leaves-list"></div>
        </div>

        <div class="modal fade" id="leaveModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow" style="border-radius: var(--radius);">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold">New leave request</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="leaveForm">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label">From</label>
                                <input type="date" class="form-control" id="leave-start" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">To</label>
                                <input type="date" class="form-control" id="leave-end" required>
                            </div>
                            <div class="mb-0">
                                <label class="form-label">Reason</label>
                                <textarea class="form-control" id="leave-reason" rows="4" placeholder="Explain where you are going and purpose (min 10 characters)..." required minlength="10" maxlength="1000"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-premium px-4">Submit request</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'student') { window.location.href = 'login.html'; return; }
            renderSidebar('Leave Requests', user.role);
            renderTopNav(user.name);

            const today = new Date().toISOString().slice(0, 10);
            document.getElementById('leave-start').min = today;
            document.getElementById('leave-end').min = today;

            document.getElementById('leave-start').addEventListener('change', () => {
                document.getElementById('leave-end').min = document.getElementById('leave-start').value || today;
            });

            document.getElementById('leaveForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const startDate = document.getElementById('leave-start').value;
                const endDate = document.getElementById('leave-end').value;
                const reason = document.getElementById('leave-reason').value.trim();
                if (new Date(endDate) < new Date(startDate)) {
                    alert('End date must be on or after start date.');
                    return;
                }
                try {
                    await apiRequest('/leaves', {
                        method: 'POST',
                        body: JSON.stringify({ startDate, endDate, reason })
                    });
                    bootstrap.Modal.getInstance(document.getElementById('leaveModal')).hide();
                    document.getElementById('leaveForm').reset();
                    document.getElementById('leave-end').min = today;
                    await loadMyLeaves();
                } catch (error) {
                    alert(error.message || 'Failed to submit leave request.');
                }
            });

            await loadMyLeaves();
        });

        function leaveStatusBadge(status) {
            if (status === 'Approved') return 'badge-success';
            if (status === 'Rejected') return 'badge-danger';
            return 'badge-warning';
        }

        async function loadMyLeaves() {
            const list = document.getElementById('leaves-list');
            let leaves = [];
            try {
                const response = await apiRequest('/leaves/me');
                leaves = response.leaveRequests || [];
            } catch (_e) {
                list.innerHTML = '<p class="text-danger">Failed to load leave requests.</p>';
                return;
            }

            if (!leaves.length) {
                list.innerHTML = '<p class="text-muted py-4">You have no leave requests yet. Submit one when you need to stay away from the hostel.</p>';
                return;
            }

            list.innerHTML = leaves.map((l) => `
                <div class="custom-table-card mb-3 p-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-2">
                        <div>
                            <span class="fw-bold">${new Date(l.startDate).toLocaleDateString()} – ${new Date(l.endDate).toLocaleDateString()}</span>
                            <span class="text-muted small ms-2">Requested ${new Date(l.createdAt).toLocaleString()}</span>
                        </div>
                        <span class="badge badge-custom ${leaveStatusBadge(l.status)}">${l.status}</span>
                    </div>
                    <p class="mb-2 text-muted small">${String(l.reason || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
                    ${l.status !== 'Pending' && l.adminRemark ? `<p class="mb-0 small"><strong>Admin note:</strong> ${String(l.adminRemark).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
