<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Leaves - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Leave Requests</h2>
        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">Assigned Students Leave Requests</h5>
                <select class="form-select form-select-sm" style="max-width: 200px;" id="filter-leave-status">
                    <option value="all">All statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead><tr><th>Student</th><th>Room</th><th>Dates</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="leaves-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const context = await initWardenPage("Leave Requests");
            if (!context) return;
            document.getElementById("filter-leave-status").addEventListener("change", loadLeaves);
            await loadLeaves();
        });

        async function loadLeaves() {
            const filter = document.getElementById("filter-leave-status").value;
            const q = filter === "all" ? "" : `?status=${encodeURIComponent(filter)}`;
            const tbody = document.getElementById("leaves-body");
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted">Loading...</td></tr>';
            try {
                const response = await apiRequest(`/leaves${q}`);
                const leaves = response.leaveRequests || [];
                if (!leaves.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No leave requests found.</td></tr>';
                    return;
                }
                tbody.innerHTML = leaves.map((l) => `
                    <tr>
                        <td>${l.student?.name || "-"}</td>
                        <td>${l.student?.roomNo || "-"}</td>
                        <td>${new Date(l.startDate).toLocaleDateString()} - ${new Date(l.endDate).toLocaleDateString()}</td>
                        <td>${l.status}</td>
                        <td>
                            ${l.status === "Pending" ? `
                                <button class="btn btn-sm btn-success" onclick="review('${l._id}','Approved')">Approve</button>
                                <button class="btn btn-sm btn-danger" onclick="review('${l._id}','Rejected')">Reject</button>
                            ` : '<span class="text-muted small">Processed</span>'}
                        </td>
                    </tr>
                `).join("");
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-danger">${error.message || "Failed to load leaves."}</td></tr>`;
            }
        }

        async function review(id, status) {
            const adminRemark = prompt(`Optional note for ${status.toLowerCase()}:`) || "";
            try {
                await apiRequest(`/leaves/${id}/status`, {
                    method: "PATCH",
                    body: JSON.stringify({ status, adminRemark })
                });
                await loadLeaves();
            } catch (error) {
                alert(error.message || "Failed to update leave status.");
            }
        }
    </script>
</body>
</html>
