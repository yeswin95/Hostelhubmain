<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Attendance - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Attendance Management</h2>

        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom">
                <h5 class="fw-bold mb-0">Student Attendance Records</h5>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Current %</th>
                            <th>Status</th>
                            <th>Update Attendance</th>
                        </tr>
                    </thead>
                    <tbody id="admin-attendance-list">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
            renderSidebar('Attendance', 'admin');
            renderTopNav(user.name);
            
            loadAdminAttendance();
        });

        async function loadAdminAttendance() {
            const list = document.getElementById('admin-attendance-list');
            let students = [];
            try {
                const response = await apiRequest('/users/students');
                students = response.students || [];
            } catch (_e) {
                list.innerHTML = '<tr><td colspan="4" class="text-danger py-3">Failed to load attendance data.</td></tr>';
                return;
            }
            
            list.innerHTML = students.map(s => {
                return `
                    <tr>
                        <td>
                            <div class="fw-bold">${s.name}</div>
                            <div class="small text-muted">${s.course}</div>
                        </td>
                        <td>
                            <div class="fw-bold">Track via daily logs</div>
                        </td>
                        <td>
                            <span class="badge badge-custom badge-info">
                                Active
                            </span>
                        </td>
                        <td>
                            <div class="input-group input-group-sm" style="max-width: 280px;">
                                <select class="form-select" id="att-${s._id}">
                                    <option value="Present">Present</option>
                                    <option value="Absent">Absent</option>
                                </select>
                                <button class="btn btn-primary" onclick="updateAttendance('${s._id}')">Mark Today</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateAttendance(id) {
            const status = document.getElementById(`att-${id}`).value;
            const date = new Date().toISOString().split('T')[0];
            try {
                await apiRequest('/attendance', {
                    method: 'POST',
                    body: JSON.stringify({ studentId: id, date, status })
                });
                alert('Attendance updated.');
                loadAdminAttendance();
            } catch (error) {
                alert(error.message || 'Failed to update attendance.');
            }
        }
    </script>
</body>
</html>
