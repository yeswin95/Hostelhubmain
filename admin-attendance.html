<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Attendance - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Attendance Management</h2>

        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom d-flex flex-wrap justify-content-between align-items-center gap-3">
                <h5 class="fw-bold mb-0">Student Attendance Records</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-success" onclick="setAllAttendanceStatus('Present')">All Present</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="setAllAttendanceStatus('Absent')">All Absent</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Room</th>
                            <th>Select Status</th>
                        </tr>
                    </thead>
                    <tbody id="admin-attendance-list">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
            <div class="p-4 border-top d-flex justify-content-end">
                <button class="btn btn-premium" id="mark-all-btn" onclick="markAllAttendance()">
                    <i class="bi bi-check2-square me-2"></i>Mark Attendance for All
                </button>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user || !['admin', 'warden'].includes(user.role)) { window.location.href = 'login.html'; return; }
            renderSidebar('Attendance', user.role);
            renderTopNav(user.name);
            
            loadAdminAttendance();
        });

        async function loadAdminAttendance() {
            const list = document.getElementById('admin-attendance-list');
            let students = [];
            try {
                const response = await apiRequest('/users/students');
                students = response.students || [];
            } catch (_e) {
                list.innerHTML = '<tr><td colspan="3" class="text-danger py-3">Failed to load attendance data.</td></tr>';
                return;
            }
            if (!students.length) {
                list.innerHTML = '<tr><td colspan="3" class="text-muted py-3">No students found.</td></tr>';
                return;
            }
            
            list.innerHTML = students.map(s => {
                return `
                    <tr>
                        <td>
                            <div class="fw-bold">${s.name}</div>
                            <div class="small text-muted">${s.course || '-'}</div>
                        </td>
                        <td>
                            <div class="fw-bold">${s.room?.roomNo || 'Not Allocated'}</div>
                        </td>
                        <td>
                            <div class="d-flex flex-column flex-sm-row gap-2">
                                <div class="form-check">
                                    <input class="form-check-input attendance-radio" type="radio" name="att-${s._id}" id="att-${s._id}-present" value="Present" checked>
                                    <label class="form-check-label" for="att-${s._id}-present">Present</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input attendance-radio" type="radio" name="att-${s._id}" id="att-${s._id}-absent" value="Absent">
                                    <label class="form-check-label" for="att-${s._id}-absent">Absent</label>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function setAllAttendanceStatus(status) {
            const radioToCheck = status === 'Absent' ? 'absent' : 'present';
            document.querySelectorAll(`input[id$="-${radioToCheck}"]`).forEach(radio => {
                radio.checked = true;
            });
        }

        async function markAllAttendance() {
            const rows = Array.from(document.querySelectorAll('#admin-attendance-list tr'));
            if (!rows.length) {
                alert('No students found to mark attendance.');
                return;
            }
            const markBtn = document.getElementById('mark-all-btn');
            markBtn.disabled = true;
            markBtn.textContent = 'Marking...';
            const date = new Date().toISOString().split('T')[0];
            try {
                for (const row of rows) {
                    const radio = row.querySelector('input.attendance-radio:checked');
                    if (!radio) continue;
                    const name = radio.getAttribute('name') || '';
                    const studentId = name.replace('att-', '');
                    const status = radio.value;
                    if (!studentId) continue;
                    await apiRequest('/attendance', {
                        method: 'POST',
                        body: JSON.stringify({ studentId, date, status })
                    });
                }
                alert('Attendance marked for all listed students.');
            } catch (error) {
                alert(error.message || 'Failed to mark attendance for all students.');
            } finally {
                markBtn.disabled = false;
                markBtn.innerHTML = '<i class="bi bi-check2-square me-2"></i>Mark Attendance for All';
            }
        }
    </script>
</body>
</html>
