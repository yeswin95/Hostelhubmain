<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in">
            <div class="login-left">
                <div class="mb-5">
                    <a href="index.html" class="text-white text-decoration-none d-flex align-items-center gap-2 fs-3 fw-bold">
                        <i class="bi bi-building"></i> HostelHub
                    </a>
                </div>
                <h1 class="display-6 fw-bold mb-4">Create your account</h1>
                <p class="lead opacity-75 mb-5">
                    Students start with room allocation pending. Admin accounts require an invite key.
                </p>
                <div class="mt-auto">
                    <p class="small mb-0">© 2026 HostelHub Management System</p>
                </div>
            </div>

            <div class="login-right">
                <div class="text-center mb-5 d-lg-none">
                    <h2 class="text-primary fw-bold"><i class="bi bi-building"></i> HostelHub</h2>
                </div>
                <h2 class="fw-bold mb-2">Register</h2>
                <p class="text-muted mb-4">Enter your details to create an account.</p>

                <form id="signupForm">
                    <div class="mb-3">
                        <label class="form-label fw-600">Full Name</label>
                        <input type="text" id="name" class="form-control bg-light" placeholder="Your name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Email Address</label>
                        <input type="email" id="email" class="form-control bg-light" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Password</label>
                        <input type="password" id="password" class="form-control bg-light" placeholder="Min 6 characters" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Role</label>
                        <select id="role" class="form-select bg-light" required>
                            <option value="student" selected>Student</option>
                            <option value="admin">Administrator / Warden</option>
                        </select>
                    </div>

                    <div class="row g-3 mb-3" id="studentFields">
                        <div class="col-md-6">
                            <label class="form-label fw-600">Phone</label>
                            <input type="text" id="phone" class="form-control bg-light" placeholder="Optional">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600">Course</label>
                            <input type="text" id="course" class="form-control bg-light" placeholder="Optional">
                        </div>
                    </div>

                    <div class="mb-3 d-none" id="adminKeyWrap">
                        <label class="form-label fw-600">Admin Invite Key</label>
                        <input type="password" id="adminSignupKey" class="form-control bg-light" placeholder="Required for admin signup">
                        <div class="form-text">This must match `ADMIN_SIGNUP_KEY` on the backend.</div>
                    </div>

                    <button type="submit" class="btn btn-premium w-100 py-3 mb-3">Create Account</button>

                    <div class="text-center">
                        <p class="text-muted small mb-0">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Sign in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        const roleEl = document.getElementById('role');
        const adminKeyWrap = document.getElementById('adminKeyWrap');
        const adminKeyEl = document.getElementById('adminSignupKey');

        function syncRoleUI() {
            const role = roleEl.value;
            const isAdmin = role === 'admin';
            adminKeyWrap.classList.toggle('d-none', !isAdmin);
            adminKeyEl.required = isAdmin;
        }

        roleEl.addEventListener('change', syncRoleUI);
        syncRoleUI();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                role: roleEl.value
            };

            const phone = document.getElementById('phone').value.trim();
            const course = document.getElementById('course').value.trim();
            if (phone) payload.phone = phone;
            if (course) payload.course = course;

            if (payload.role === 'admin') {
                payload.adminSignupKey = adminKeyEl.value;
            }

            try {
                const response = await apiRequest('/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                setAuthSession(response.token, response.user);
                window.location.href = 'welcome.html';
            } catch (error) {
                alert(error.message || 'Registration failed. Please try again.');
            }
        });
    </script>
</body>
</html>
