<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Notices - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Notices</h2>
            <button class="btn btn-premium" onclick="postNotice()"><i class="bi bi-megaphone me-2"></i>Create Notice</button>
        </div>
        <div class="row fade-in" id="notice-list"></div>
    </main>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const context = await initWardenPage("Notices");
            if (!context) return;
            await loadNotices();
        });

        async function loadNotices() {
            const list = document.getElementById("notice-list");
            list.innerHTML = '<div class="col-12 text-muted">Loading notices...</div>';
            try {
                const response = await apiRequest("/notices");
                const notices = response.notices || [];
                if (!notices.length) {
                    list.innerHTML = '<div class="col-12 text-muted">No notices found.</div>';
                    return;
                }
                list.innerHTML = notices.map((n) => `
                    <div class="col-md-6 mb-4">
                        <div class="item-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge badge-custom ${n.priority === "urgent" ? "badge-danger" : "badge-info"}">${(n.priority || "normal").toUpperCase()}</span>
                                <button class="btn btn-sm btn-light border text-danger" onclick="deleteNotice('${n._id}')"><i class="bi bi-trash"></i></button>
                            </div>
                            <h5 class="fw-bold mb-2">${n.title}</h5>
                            <p class="text-muted small mb-2">${n.message}</p>
                            <div class="small text-muted">Posted by ${n.publishedBy?.name || "Unknown"}</div>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                list.innerHTML = `<div class="col-12 text-danger">${error.message || "Failed to load notices."}</div>`;
            }
        }

        async function postNotice() {
            const title = prompt("Notice title:");
            if (!title) return;
            const message = prompt("Notice message:");
            if (!message) return;
            try {
                await apiRequest("/notices", {
                    method: "POST",
                    body: JSON.stringify({ title: title.trim(), message: message.trim(), priority: "normal" })
                });
                await loadNotices();
            } catch (error) {
                alert(error.message || "Failed to create notice.");
            }
        }

        async function deleteNotice(id) {
            if (!confirm("Delete this notice?")) return;
            try {
                await apiRequest(`/notices/${id}`, { method: "DELETE" });
                await loadNotices();
            } catch (error) {
                alert(error.message || "Failed to delete notice.");
            }
        }
    </script>
</body>
</html>
