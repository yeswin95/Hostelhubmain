<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Attendance - HostelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <aside class="sidebar"></aside>
    <main class="main-wrapper">
        <h2 class="fw-bold mb-4">Attendance Management</h2>
        <div class="custom-table-card fade-in">
            <div class="p-4 border-bottom"><h5 class="fw-bold mb-0">Assigned Students</h5></div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead><tr><th>Student</th><th>Room</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="attendance-list"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="js/data.js"></script>
    <script>
        let students = [];
        document.addEventListener("DOMContentLoaded", async () => {
            const context = await initWardenPage("Attendance");
            if (!context) return;
            await loadStudents();
        });

        async function loadStudents() {
            const tbody = document.getElementById("attendance-list");
            tbody.innerHTML = '<tr><td colspan="4" class="text-muted">Loading...</td></tr>';
            try {
                const response = await apiRequest("/users/students");
                students = response.students || [];
                if (!students.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-muted">No students found for your assigned rooms.</td></tr>';
                    return;
                }
                tbody.innerHTML = students.map((s) => `
                    <tr>
                        <td><div class="fw-bold">${s.name}</div><div class="small text-muted">${s.email}</div></td>
                        <td>${s.room?.roomNo || "-"}</td>
                        <td>
                            <select id="status-${s._id}" class="form-select form-select-sm" style="max-width:140px;">
                                <option value="Present">Present</option>
                                <option value="Absent">Absent</option>
                            </select>
                        </td>
                        <td><button class="btn btn-sm btn-primary" onclick="mark('${s._id}')">Mark Today</button></td>
                    </tr>
                `).join("");
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-danger">${error.message || "Failed to load students."}</td></tr>`;
            }
        }

        async function mark(studentId) {
            const status = document.getElementById(`status-${studentId}`).value;
            const date = new Date().toISOString().split("T")[0];
            try {
                await apiRequest("/attendance", {
                    method: "POST",
                    body: JSON.stringify({ studentId, date, status })
                });
                alert("Attendance marked.");
            } catch (error) {
                alert(error.message || "Failed to mark attendance.");
            }
        }
    </script>
</body>
</html>
